services:
  db:
    image: postgres:18.1
    container_name: app-database
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql
    ports:
      - '5432:5432'

  app:
    build:
      context: .
      target: development
      dockerfile: Dockerfile
    container_name: app-api
    command: npm run start:dev
    env_file:
      - .env
    ports:
      - '3000:3000'
    depends_on:
      - db
    volumes:
      - .:/home/app
      - node_modules:/home/app/node_modules

volumes:
  db_data:
  node_modules:
